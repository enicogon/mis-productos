<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compra en Proceso</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; }
.container { max-width:800px; margin:auto; }
.card { background:#1e293b; padding:15px; margin-top:10px; border-radius:8px; }
input, button { padding:8px; margin:5px; }
button { background:#3b82f6; color:white; border:none; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
  <h2>Compra en proceso</h2>

  <div class="card">
    <input id="nombre" placeholder="Producto">
    <input id="cantidad" type="number" placeholder="Cantidad">
    <input id="precio" type="number" placeholder="Precio USD">
    <button onclick="agregar()">Agregar</button>
  </div>

  <div class="card">
    <h3>Items</h3>
    <ul id="lista"></ul>
  </div>

  <div class="card">
    <input id="extra" type="number" placeholder="Gastos extra">
    <button onclick="calcular()">Calcular</button>
    <p id="total"></p>
  </div>

  <div class="card">
    <button onclick="guardar()">Guardar</button>
  </div>
</div>

<script>
let compra = { items: [], extraUSD:0 };

function agregar() {
  const nombre = document.getElementById("nombre").value;
  const cantidad = Number(document.getElementById("cantidad").value);
  const precio = Number(document.getElementById("precio").value);

  compra.items.push({nombre, cantidad, precio});
  render();
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  compra.items.forEach(i => {
    lista.innerHTML += `<li>${i.nombre} x${i.cantidad}</li>`;
  });
}

function calcular() {
  compra.extraUSD = Number(document.getElementById("extra").value);

  const subtotal = compra.items.reduce((a,i)=>a+i.precio*i.cantidad,0);
  const total = subtotal + subtotal*0.2 + compra.extraUSD;

  document.getElementById("total").innerText =
    "Total: " + total.toFixed(2);
}

function guardar() {
  fetch("URL_SCRIPT", {
    method:"POST",
    body: JSON.stringify({
      action:"createProceso",
      record: compra
    })
  }).then(r=>r.json()).then(alert);
}
</script>
</body>
</html>
